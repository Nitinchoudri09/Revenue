services:
  db:
    image: postgres:16-alpine
    environment: {POSTGRES_DB: reconcile, POSTGRES_USER: reconcile, POSTGRES_PASSWORD: reconcile}
    healthcheck: {test: [CMD-SHELL, "pg_isready -U reconcile"], interval: 5s, timeout: 5s, retries: 10}
  api:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    depends_on: {db: {condition: service_healthy}}
  web:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [api]
