services:
  # BACKEND SERVICE
  - type: web
    name: reconciliation-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://reconciliation-ui.onrender.com

  # FRONTEND SERVICE
  - type: web
    name: reconciliation-ui
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://revenue-ec1w.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
